name: Fake GPS Build (GitHub Actions)

# ============================================================
# GitHub Actions CI/CD sebagai alternatif Codemagic
# Build APK debug & AAB release
# Trigger: push ke main, manual workflow_dispatch
# ============================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (Flutter)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test || echo "No tests yet"
        continue-on-error: true

      - name: Build APK debug
        run: |
          flutter build apk --debug \
            --dart-define=MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}

      - name: Build AAB release
        run: |
          flutter build appbundle --release \
            --dart-define=MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
