# ============================================================
# Codemagic CI/CD - Fake GPS
# Build APK debug langsung, tanpa analyze/test
# ============================================================

workflows:
  fake-gps-build:
    name: Fake GPS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        MAPS_API_KEY: your-api-key-here  # ganti di Codemagic UI > Environment Variables
    scripts:
      - name: Build APK debug
        script: flutter build apk --debug --dart-define=MAPS_API_KEY=$MAPS_API_KEY
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true
